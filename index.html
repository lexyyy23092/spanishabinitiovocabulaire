<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Vocabulario General</title>
<style>
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:#e7f6ea;
  color:#22303e;
  font-family:"Segoe UI", Arial, Helvetica, sans-serif;
  min-height:100vh;
  padding:36px 16px 60px;
}

#app{ max-width:640px; margin:0 auto; }

h1.title{
  text-align:center;
  color:#d6304a;
  font-size:1.85rem;
  font-weight:700;
  margin:0 0 6px;
}
p.subtitle{
  text-align:center;
  color:#5c6b74;
  font-size:0.92rem;
  margin:0 0 26px;
}

.panel{
  background:#ffffff;
  border:1px solid #e1e6e2;
  border-radius:10px;
  padding:20px 22px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(20,40,30,0.06);
}

.field-label{
  font-size:0.85rem;
  font-weight:600;
  color:#22303e;
  margin-bottom:6px;
  display:block;
}
select, input[type=text]{
  width:100%;
  padding:10px 12px;
  border-radius:7px;
  border:1px solid #c7d0cb;
  font-size:0.92rem;
  color:#22303e;
  background:#fbfdfb;
  font-family:inherit;
}
select:focus, input[type=text]:focus{
  outline:none;
  border-color:#4a7ba6;
  box-shadow:0 0 0 3px rgba(74,123,166,0.15);
}
.field{ margin-bottom:14px; }
.field:last-child{ margin-bottom:0; }

.flashcard-panel{
  background:#ffffff;
  border:2px solid #5b8fc7;
  border-radius:10px;
  padding:30px 24px;
  text-align:center;
  min-height:190px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin-bottom:14px;
  user-select:none;
  transition:box-shadow .15s ease;
}
.flashcard-panel:hover{ box-shadow:0 4px 14px rgba(91,143,199,0.25); }
.card-label{
  font-size:0.78rem;
  letter-spacing:0.12em;
  color:#7c8892;
  font-weight:600;
  margin-bottom:14px;
}
.card-word{
  font-size:1.9rem;
  font-weight:700;
  color:#1f3a5f;
  word-break:break-word;
  line-height:1.3;
}
.card-hint{
  margin-top:16px;
  font-size:0.8rem;
  color:#8b96a0;
  font-style:italic;
}

.card-counter{
  text-align:center;
  font-weight:700;
  color:#1f3a5f;
  font-size:0.95rem;
  margin-bottom:14px;
}

.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:6px;
}
button.action-btn{
  flex:1;
  background:#4a7ba6;
  color:#fff;
  border:none;
  border-radius:7px;
  padding:12px 10px;
  font-size:0.9rem;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  transition:background .12s ease;
}
button.action-btn:hover{ background:#3d6890; }
button.action-btn:disabled{ background:#a9bcc9; cursor:not-allowed; }

.panel-heading{
  font-size:1.05rem;
  font-weight:700;
  color:#22303e;
  margin:0 0 16px;
}

.add-row{
  display:flex;
  gap:10px;
}
.add-row .field{ flex:1; margin-bottom:0; }
button.add-btn{
  background:#4a7ba6;
  color:#fff;
  border:none;
  border-radius:7px;
  padding:0 20px;
  font-size:0.9rem;
  font-weight:600;
  cursor:pointer;
  font-family:inherit;
  align-self:stretch;
}
button.add-btn:hover{ background:#3d6890; }

.add-msg{
  margin-top:10px;
  font-size:0.85rem;
  min-height:1.1em;
}
.add-msg.success{ color:#2c8a4a; }
.add-msg.error{ color:#c1453b; }

@media (max-width:480px){
  .add-row{ flex-direction:column; }
  button.add-btn{ padding:12px; }
}

</style>
</head>
<body>
<div id="app">
  <h1 class="title">Banco de Vocabulario General</h1>
  <p class="subtitle">Spanish Ab Initio SL — {TOTAL}+ Words Active Engine</p>

  <div class="panel">
    <div class="field">
      <label class="field-label" for="unit-select">Selecciona Bloque / Tema:</label>
      <select id="unit-select"></select>
    </div>
    <div class="field">
      <label class="field-label" for="direction-select">Dirección del Estudio:</label>
      <select id="direction-select">
        <option value="alt">Alternando (English &lt;-&gt; Español)</option>
        <option value="es-en">Español -&gt; English</option>
        <option value="en-es">English -&gt; Español</option>
      </select>
    </div>
  </div>

  <div class="flashcard-panel" id="flashcard">
    <div class="card-label" id="card-label">ESPAÑOL</div>
    <div class="card-word" id="card-word">—</div>
    <div class="card-hint" id="card-hint"></div>
  </div>

  <div class="card-counter" id="card-counter">Tarjeta 1 de 1</div>

  <div class="btn-row">
    <button class="action-btn" id="prev-btn">Anterior</button>
    <button class="action-btn" id="shuffle-btn">Mezclar (Shuffle)</button>
    <button class="action-btn" id="next-btn">Siguiente</button>
  </div>

  <div class="panel" style="margin-top:24px;">
    <div class="panel-heading">Añadir vocabulario personalizado</div>
    <div class="field">
      <label class="field-label" for="add-unit-select">Añadir a esta unidad:</label>
      <select id="add-unit-select"></select>
    </div>
    <div class="add-row">
      <div class="field">
        <input type="text" id="input-es" placeholder="Español">
      </div>
      <div class="field">
        <input type="text" id="input-en" placeholder="English">
      </div>
      <button class="add-btn" id="add-btn">Añadir</button>
    </div>
    <div class="add-msg" id="add-msg"></div>
  </div>
</div>

<script>
let UNITS = [];
let customAdditions = {}; // unitIndex -> array of [es,en]
let currentUnitIndex = -1; // -1 = all
let direction = 'alt'; // 'alt' | 'es-en' | 'en-es'
let deck = []; // array of {es,en}
let pos = 0;
let revealed = false;
let frontIsSpanish = true;

function unitPairs(idx){
  const base = idx === -1 ? UNITS.flatMap(u => u.pairs) : UNITS[idx].pairs.slice();
  const extra = idx === -1
    ? Object.values(customAdditions).flat()
    : (customAdditions[idx] || []);
  return base.concat(extra);
}

function unitLabel(idx){
  if(idx === -1) return 'Todo el vocabulario';
  const u = UNITS[idx];
  const count = unitPairs(idx).length;
  return u.subtheme;
}

function unitCount(idx){
  return unitPairs(idx).length;
}

function buildSelect(selectEl, includeAll){
  selectEl.innerHTML = '';
  if(includeAll){
    const allCount = unitCount(-1);
    const opt = document.createElement('option');
    opt.value = '-1';
    opt.textContent = `🔀 Todo el vocabulario (${allCount} palabras)`;
    selectEl.appendChild(opt);
  }
  let lastTheme = null;
  let group = null;
  UNITS.forEach((u, i) => {
    if(u.theme !== lastTheme){
      group = document.createElement('optgroup');
      group.label = u.theme;
      selectEl.appendChild(group);
      lastTheme = u.theme;
    }
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${u.subtheme} (${unitCount(i)} palabras)`;
    group.appendChild(opt);
  });
}

function refreshUnitSelects(){
  const studySel = document.getElementById('unit-select');
  const addSel = document.getElementById('add-unit-select');
  const prevStudy = studySel.value;
  const prevAdd = addSel.value;
  buildSelect(studySel, true);
  buildSelect(addSel, false);
  if([...studySel.options].some(o => o.value === prevStudy)) studySel.value = prevStudy;
  if([...addSel.options].some(o => o.value === prevAdd)) addSel.value = prevAdd;
}

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck(shuffled){
  const pairs = unitPairs(currentUnitIndex).slice();
  deck = pairs.map((p, i) => ({ es: p[0], en: p[1] }));
  if(shuffled) shuffle(deck);
  pos = 0;
  revealed = false;
  render();
}

function computeFrontIsSpanish(){
  if(direction === 'es-en') return true;
  if(direction === 'en-es') return false;
  return pos % 2 === 0; // alternating
}

function render(){
  const total = deck.length;
  document.getElementById('card-counter').textContent = total ? `Tarjeta ${pos+1} de ${total}` : 'Sin tarjetas';
  const card = deck[pos];
  frontIsSpanish = computeFrontIsSpanish();
  const label = document.getElementById('card-label');
  const word = document.getElementById('card-word');
  const hint = document.getElementById('card-hint');
  if(!card){
    label.textContent = '';
    word.textContent = 'Añade palabras para empezar';
    hint.textContent = '';
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('next-btn').disabled = true;
    document.getElementById('shuffle-btn').disabled = true;
    return;
  }
  document.getElementById('prev-btn').disabled = pos <= 0;
  document.getElementById('next-btn').disabled = pos >= total - 1;
  document.getElementById('shuffle-btn').disabled = false;

  if(!revealed){
    label.textContent = frontIsSpanish ? 'ESPAÑOL' : 'ENGLISH';
    word.textContent = frontIsSpanish ? card.es : card.en;
    hint.textContent = 'Haz clic en la tarjeta para ver la traducción';
  } else {
    label.textContent = frontIsSpanish ? 'ENGLISH' : 'ESPAÑOL';
    word.textContent = frontIsSpanish ? card.en : card.es;
    hint.textContent = 'Haz clic de nuevo para volver';
  }
}

function flipCard(){
  if(!deck[pos]) return;
  revealed = !revealed;
  render();
}

function goPrev(){
  if(pos > 0){ pos -= 1; revealed = false; render(); }
}
function goNext(){
  if(pos < deck.length - 1){ pos += 1; revealed = false; render(); }
}
function doShuffle(){
  shuffle(deck);
  pos = 0;
  revealed = false;
  render();
}

function onUnitChange(){
  currentUnitIndex = parseInt(document.getElementById('unit-select').value, 10);
  buildDeck(false);
}
function onDirectionChange(){
  direction = document.getElementById('direction-select').value;
  render();
}

function addWord(){
  const unitIdx = parseInt(document.getElementById('add-unit-select').value, 10);
  const esInput = document.getElementById('input-es');
  const enInput = document.getElementById('input-en');
  const es = esInput.value.trim();
  const en = enInput.value.trim();
  const msg = document.getElementById('add-msg');
  if(!es || !en){
    msg.textContent = 'Escribe la palabra en español e inglés.';
    msg.className = 'add-msg error';
    return;
  }
  if(!customAdditions[unitIdx]) customAdditions[unitIdx] = [];
  customAdditions[unitIdx].push([es, en]);
  esInput.value = '';
  enInput.value = '';
  msg.textContent = `Añadido a "${UNITS[unitIdx].subtheme}".`;
  msg.className = 'add-msg success';
  refreshUnitSelects();
  document.getElementById('unit-select').value = String(currentUnitIndex);
  if(currentUnitIndex === unitIdx || currentUnitIndex === -1){
    buildDeck(false);
  }
}

function init(){
  UNITS = JSON.parse(document.getElementById('units-data').textContent);
  refreshUnitSelects();
  document.getElementById('unit-select').value = '-1';
  currentUnitIndex = -1;
  buildDeck(false);

  document.getElementById('unit-select').addEventListener('change', onUnitChange);
  document.getElementById('direction-select').addEventListener('change', onDirectionChange);
  document.getElementById('prev-btn').addEventListener('click', goPrev);
  document.getElementById('next-btn').addEventListener('click', goNext);
  document.getElementById('shuffle-btn').addEventListener('click', doShuffle);
  document.getElementById('flashcard').addEventListener('click', flipCard);
  document.getElementById('add-btn').addEventListener('click', addWord);
  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') goPrev();
    else if(e.key === 'ArrowRight') goNext();
    else if(e.key === ' '){ e.preventDefault(); flipCard(); }
  });
}

document.addEventListener('DOMContentLoaded', init);

</script>
